app = "flashbot-2024"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = false
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[env]
  PORT = "8080"

[deploy]
  strategy = "rolling"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
